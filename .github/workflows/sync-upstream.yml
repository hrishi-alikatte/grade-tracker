name: Sync Upstream

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [sync_trigger]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync Upstream
        run: |
          git remote add upstream https://github.com/pranathi-alikatte/grade-tracker.git || true
          git fetch upstream main
          git checkout main
          git merge upstream/main -m "chore: sync with upstream/main" || {
            echo "Automatic merge failed. Manual intervention required."
            exit 1
          }

      - name: Push to Origin
        run: |
          git push origin main
